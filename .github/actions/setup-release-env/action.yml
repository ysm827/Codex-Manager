name: setup-release-env
description: Setup pnpm, Node.js, Rust toolchain, and Rust cache for release jobs.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22.22.0"
  pnpm-version:
    description: pnpm version to install.
    required: false
    default: "10.30.3"
  pnpm-lock-path:
    description: Lockfile path used for pnpm cache.
    required: false
    default: |
      apps/pnpm-lock.yaml
      .github/workflows/release-all.yml
  enable-pnpm-cache:
    description: Enable pnpm store cache through actions/cache.
    required: false
    default: "true"
  rust-toolchain:
    description: Rust toolchain channel.
    required: false
    default: stable
  rust-target:
    description: Optional Rust target triple.
    required: false
    default: ""
  rust-cache-shared-key:
    description: Shared rust-cache key.
    required: false
    default: release-all-platforms-rust-stable-v1
  enable-rust-cache:
    description: Enable rust-cache for Cargo registry and related caches.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Enable Corepack and activate pnpm
      shell: pwsh
      run: |
        corepack enable
        corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

    - name: Resolve pnpm cache metadata
      id: pnpm-cache
      if: ${{ inputs.enable-pnpm-cache == 'true' }}
      shell: pwsh
      run: |
        $storePath = (pnpm store path --silent).Trim()
        if (-not $storePath) {
          throw "pnpm store path is empty"
        }

        $entries = [System.Collections.Generic.List[string]]::new()
        $patterns = @'
        ${{ inputs.pnpm-lock-path }}
        '@ -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }

        foreach ($pattern in $patterns) {
          $resolved = @(Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | Sort-Object FullName)
          if ($resolved.Count -eq 0) {
            $entries.Add("missing:$pattern")
            continue
          }

          foreach ($file in $resolved) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $entries.Add("$($file.FullName.Replace('\', '/')):$hash")
          }
        }

        $joined = [string]::Join("`n", $entries)
        $bytes = [System.Text.Encoding]::UTF8.GetBytes($joined)
        $stream = [System.IO.MemoryStream]::new($bytes)
        try {
          $digest = (Get-FileHash -InputStream $stream -Algorithm SHA256).Hash.ToLowerInvariant()
        }
        finally {
          $stream.Dispose()
        }

        "store-path=$storePath" >> $env:GITHUB_OUTPUT
        "cache-key=$digest" >> $env:GITHUB_OUTPUT

    - name: Cache pnpm store
      if: ${{ inputs.enable-pnpm-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache.outputs.store-path }}
        key: ${{ runner.os }}-pnpm-${{ inputs.node-version }}-${{ inputs.pnpm-version }}-${{ steps.pnpm-cache.outputs.cache-key }}
        restore-keys: |
          ${{ runner.os }}-pnpm-${{ inputs.node-version }}-${{ inputs.pnpm-version }}-
          ${{ runner.os }}-pnpm-${{ inputs.node-version }}-
          ${{ runner.os }}-pnpm-

    - name: Setup Rust
      if: ${{ inputs.rust-target == '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Setup Rust target
      if: ${{ inputs.rust-target != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        targets: ${{ inputs.rust-target }}

    - name: Cache Rust dependencies
      if: ${{ inputs.enable-rust-cache == 'true' }}
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.rust-cache-shared-key }}
        cache-targets: false
