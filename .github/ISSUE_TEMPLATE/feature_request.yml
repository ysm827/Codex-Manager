name: Feature Request
description: 提交一个新功能或治理改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: 需求摘要
      placeholder: 用一句话说明你想解决什么问题
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      options:
        - Frontend
        - Desktop / Tauri
        - Service
        - Gateway / Protocol Adapter
        - Docs / Governance
        - Workflow / Release
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 为什么现在的行为不够好
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你期望的结果，不必直接写实现细节
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 补充上下文
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交检查
      options:
        - label: 我已确认这不是单纯的使用问题或环境配置问题
          required: true
