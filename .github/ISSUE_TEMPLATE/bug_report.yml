name: Bug Report
description: 报告一个可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        提交前请先确认：

        - 问题可以稳定复现
        - 已尽量提供脱敏日志或截图
        - 不包含真实 token、cookie、API key
  - type: input
    id: version
    attributes:
      label: 版本
      description: 例如 v0.1.6、main 最新提交、源码运行
      placeholder: v0.1.6
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - Desktop
        - Service
        - Web
        - Gateway / Protocol Adapter
        - Workflow / Release
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、运行方式、客户端工具等
      placeholder: Windows 11 / 桌面端 / Cherry Studio
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志 / 截图
      description: 请勿粘贴真实 token、cookie、API key
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交检查
      options:
        - label: 我已确认内容不包含敏感凭据
          required: true
        - label: 我已阅读仓库的 SECURITY.md
          required: true
